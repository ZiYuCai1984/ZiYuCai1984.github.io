        function document_decrypt(encrypt, aseKey) {
            return CryptoJS.AES.decrypt(encrypt,
                CryptoJS.enc.Utf8.parse(aseKey),
                {
                    mode: CryptoJS.mode.ECB,
                    padding: CryptoJS.pad.Pkcs7
                }).toString(CryptoJS.enc.Utf8);
        }
