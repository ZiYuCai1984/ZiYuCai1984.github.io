    <script suppress-error="BL9992">
        function document_decrypt(encrypt, aseKey) {
            return CryptoJS.AES.decrypt(encrypt,
                CryptoJS.enc.Utf8.parse(aseKey),
                {
                    mode: CryptoJS.mode.ECB,
                    padding: CryptoJS.pad.Pkcs7
                }).toString(CryptoJS.enc.Utf8);
        }
        window.addEventListener('load',

                var id = '615c3d11-6ebf-4f22-8873-f8371dc3d5dd';

                if (key === null) {
                    key = prompt('Prompt', '');
                    if (key !== null) {
                        localStorage.setItem(id, key);
                    }
                }

                var documentRaw = document.getElementById('documentRaw');

                documentRaw.innerHTML = document_decrypt(documentRaw.innerHTML, key);
                documentRaw.style.visibility = 'visible';
